; =============================================================================
;  Waveshare ESP32-S3-Touch-AMOLED-1.43  (round 1.43" AMOLED, 466x466)
;  Display : SH8601 / CO5300 over QSPI   |  Touch : FT3168 over I2C  |  LVGL 8.3
;
;  Port of the Arduino-IDE example "07_LVGL_Test" to PlatformIO.
; =============================================================================

[env:esp32-s3-amoled-1in43]
; The example uses esp_lcd QSPI APIs (rgb_ele_order, flags.quad_mode) that only
; exist in ESP-IDF >= 5.0, i.e. Arduino-ESP32 core 3.x. The official PlatformIO
; "espressif32" platform is stuck on core 2.x, so we use the pioarduino fork
; (here: Arduino 3.3.9 / ESP-IDF 5.5.4).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- Memory layout: ESP32-S3R8 = 8 MB QIO flash + 8 MB Octal (OPI) PSRAM ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -DBOARD_HAS_PSRAM
    ; tell LVGL to load our config with a plain  #include "lv_conf.h"
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    ; lv_conf.h lives in include/ ; SquareLine UI headers live in src/ui/
    -Iinclude
    -Isrc/ui

lib_deps =
    lvgl/lvgl@^8.3.11
