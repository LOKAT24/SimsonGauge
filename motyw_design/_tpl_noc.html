<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:48px;background:#e7e5df;font-family:'Barlow Condensed',sans-serif;">

  <div style="display:flex;align-items:center;justify-content:center;width:506px;height:506px;border-radius:50%;background:{{ bezel }};box-shadow:0 18px 44px rgba(0,0,0,.32),inset 0 2px 4px rgba(255,255,255,.16),inset 0 -3px 8px rgba(0,0,0,.6);">
    <div style="position:relative;width:466px;height:466px;border-radius:50%;overflow:hidden;background:{{ face }};box-shadow:{{ faceShadow }};">

      <svg width="466" height="466" viewBox="0 0 466 466" style="position:absolute;inset:0;">
        <circle cx="233" cy="233" r="220" fill="none" stroke="{{ track }}" stroke-width="10" stroke-dasharray="1037 1382" transform="rotate(135 233 233)"></circle>
        <circle cx="233" cy="233" r="220" fill="none" stroke="{{ accent }}" stroke-width="10" stroke-linecap="round" stroke-dasharray="{{ arcDash }}" transform="rotate(135 233 233)" style="filter:{{ arcFilter }};"></circle>
      </svg>

      <sc-for list="{{ ticks }}" as="t" hint-placeholder-count="13">
        <div style="position:absolute;inset:0;transform:rotate({{ t.deg }}deg);">
          <div style="position:absolute;left:50%;top:30px;transform:translateX(-50%);width:{{ t.w }}px;height:{{ t.len }}px;background:{{ t.stroke }};border-radius:1px;"></div>
          <div style="position:absolute;left:50%;top:72px;transform:translateX(-50%) rotate({{ t.negdeg }}deg);font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:22px;color:{{ t.labelColor }};">{{ t.label }}</div>
        </div>
      </sc-for>

      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:90px 0 72px;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-style:italic;font-size:30px;letter-spacing:1px;color:{{ wordColor }};">Simson</div>
          <div style="font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:2px;color:{{ subText }};">{{ rpmK }} ·×1000· 1/min</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;">
          <div style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:158px;line-height:.76;color:{{ speedColor }};">{{ speed }}</div>
          <div style="font-family:'Spline Sans Mono',monospace;font-size:13px;letter-spacing:6px;color:{{ subText }};margin-top:4px;">KM / H</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
          <div style="width:30px;height:2px;background:{{ accent }};"></div>
          <div style="font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:50px;line-height:.92;color:{{ accent }};">{{ gearLabel }}</div>
          <div style="font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:3px;color:{{ subText }};">GEAR</div>
        </div>
      </div>

    </div>
  </div>

  <div style="font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:2px;color:#a09a8e;text-transform:uppercase;">Simson S51 · Tacho 466×466 px · {{ themeLabel }}</div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script="" data-props="{&quot;$preview&quot;:{&quot;width&quot;:620,&quot;height&quot;:660},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;tag&quot;,&quot;nacht&quot;],&quot;default&quot;:&quot;nacht&quot;,&quot;tsType&quot;:&quot;'tag' | 'nacht'&quot;}}">
class Component extends DCLogic {
  state = { speed: 0, rpm: 1300, gear: 1, phase: 'accel', neutralT: 0 };

  componentDidMount() {
    this.cruiseT = 0;
    this.timer = setInterval(() => this.tick(), 50);
  }
  componentWillUnmount() { clearInterval(this.timer); }

  rpmFor(gear, speed) {
    const R = ({1:[0,24],2:[18,40],3:[34,60],4:[52,80]})[gear] || [0,24];
    let t = (speed - R[0]) / (R[1] - R[0]);
    t = Math.max(0, Math.min(1.05, t));
    return Math.round(1300 + t * (6700 - 1300));
  }

  tick() {
    let { speed, gear, phase, neutralT } = this.state;

    if (phase === 'neutral') {
      neutralT -= 1;
      if (neutralT <= 0) {
        this.setState({ phase: 'accel', gear: 1, neutralT: 0, speed: 0, rpm: this.rpmFor(1, 0) });
      } else {
        this.setState({ neutralT, rpm: 1300 });
      }
      return;
    }

    if (phase === 'accel') {
      speed += 0.35;
      if (speed >= 80) { speed = 80; phase = 'cruise'; this.cruiseT = 45; }
    } else if (phase === 'cruise') {
      this.cruiseT -= 1;
      if (this.cruiseT <= 0) phase = 'decel';
    } else if (phase === 'decel') {
      speed -= 0.45;
      if (speed <= 1) {
        this.setState({ speed: 0, gear: 0, phase: 'neutral', neutralT: 26, rpm: 1300 });
        return;
      }
    }

    let rpm = this.rpmFor(gear, speed);
    if (phase === 'accel' && rpm >= 6300 && gear < 4) { gear += 1; rpm = this.rpmFor(gear, speed); }
    if (phase === 'decel' && rpm <= 2000 && gear > 1) { gear -= 1; rpm = this.rpmFor(gear, speed); }

    this.setState({ speed, gear, phase, rpm, neutralT });
  }

  makeTicks(base, red, labelColor) {
    const arr = [];
    for (let i = 0; i <= 14; i++) {
      const major = i % 2 === 0;
      const deg = -135 + (i / 14) * 270;
      const inRed = (i * 0.5) >= 6;
      arr.push({
        deg: +deg.toFixed(2),
        negdeg: +(-deg).toFixed(2),
        len: major ? 24 : 12,
        w: major ? 4 : 2,
        stroke: inRed ? red : base,
        label: major ? String(i / 2) : '',
        labelColor: inRed ? red : labelColor,
      });
    }
    return arr;
  }

  renderVals() {
    const { speed, rpm, gear } = this.state;
    const frac = Math.max(0, Math.min(1, rpm / 7000));
    const night = (this.props.theme ?? 'nacht') === 'nacht';

    const day = {
      bezel: 'linear-gradient(150deg,#3a3a3e,#1a1a1c 60%,#2a2a2d)',
      face: 'radial-gradient(circle at 50% 42%,#f1ebda 0%,#e6dcc4 70%,#d6cbb0 100%)',
      faceShadow: 'inset 0 0 30px rgba(120,100,60,.25),inset 0 2px 10px rgba(255,255,255,.5)',
      track: 'rgba(40,35,28,.14)', accent: '#c0202a', arcFilter: 'none',
      speedColor: '#1b1a17', wordColor: '#26231d', subText: '#6f6a5e',
      ticks: this.makeTicks('#26231d', '#c0202a', '#26231d'),
      themeLabel: 'Tag',
    };
    const nacht = {
      bezel: 'linear-gradient(150deg,#2c2c2f,#101012 60%,#222225)',
      face: 'radial-gradient(circle at 50% 40%,#211d18 0%,#15110d 68%,#0b0907 100%)',
      faceShadow: 'inset 0 0 40px rgba(0,0,0,.7)',
      track: 'rgba(220,205,170,.12)', accent: '#e23b32',
      arcFilter: 'drop-shadow(0 0 7px rgba(226,59,50,.65))',
      speedColor: '#ece3cd', wordColor: '#e6dcc4', subText: '#9a9080',
      ticks: this.makeTicks('#cdbf9f', '#e23b32', '#cdbf9f'),
      themeLabel: 'Nacht',
    };
    const c = night ? nacht : day;

    return {
      speed: Math.round(speed),
      rpmK: (rpm / 1000).toFixed(1),
      gearLabel: gear === 0 ? 'N' : String(gear),
      arcDash: (frac * 1037).toFixed(1) + ' 1382',
      ...c,
    };
  }
