document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:48px;background:#e7e5df;font-family:'Barlow Condensed',sans-serif;\">\n\n  <div style=\"display:flex;align-items:center;justify-content:center;width:520px;height:520px;border-radius:50%;background:{{ bezel }};box-shadow:0 18px 44px rgba(0,0,0,.32),inset 0 2px 4px rgba(255,255,255,.16),inset 0 -3px 8px rgba(0,0,0,.6);\">\n    <div style=\"position:relative;width:480px;height:480px;border-radius:50%;overflow:hidden;background:{{ face }};box-shadow:{{ faceShadow }};\">\n\n      <svg width=\"480\" height=\"480\" viewBox=\"0 0 480 480\" style=\"position:absolute;inset:0;\">\n        <circle cx=\"240\" cy=\"240\" r=\"226\" fill=\"none\" stroke=\"{{ track }}\" stroke-width=\"10\" stroke-dasharray=\"1065 1420\" transform=\"rotate(135 240 240)\"><\u002Fcircle>\n        <circle cx=\"240\" cy=\"240\" r=\"226\" fill=\"none\" stroke=\"{{ accent }}\" stroke-width=\"10\" stroke-linecap=\"round\" stroke-dasharray=\"{{ arcDash }}\" transform=\"rotate(135 240 240)\" style=\"filter:{{ arcFilter }};\"><\u002Fcircle>\n      <\u002Fsvg>\n\n      <sc-for list=\"{{ ticks }}\" as=\"t\" hint-placeholder-count=\"13\">\n        <div style=\"position:absolute;inset:0;transform:rotate({{ t.deg }}deg);\">\n          <div style=\"position:absolute;left:50%;top:30px;transform:translateX(-50%);width:{{ t.w }}px;height:{{ t.len }}px;background:{{ t.stroke }};border-radius:1px;\"><\u002Fdiv>\n          <div style=\"position:absolute;left:50%;top:72px;transform:translateX(-50%) rotate({{ t.negdeg }}deg);font-family:'Saira Condensed',sans-serif;font-weight:600;font-size:22px;color:{{ t.labelColor }};\">{{ t.label }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:90px 0 72px;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:3px;\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-style:italic;font-size:30px;letter-spacing:1px;color:{{ wordColor }};\">Simson<\u002Fdiv>\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:2px;color:{{ subText }};\">{{ rpmK }} ·×1000· 1/min<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;align-items:center;\">\n          <div style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:158px;line-height:.76;color:{{ speedColor }};\">{{ speed }}<\u002Fdiv>\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:13px;letter-spacing:6px;color:{{ subText }};margin-top:4px;\">KM / H<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;\">\n          <div style=\"width:30px;height:2px;background:{{ accent }};\"><\u002Fdiv>\n          <div style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:50px;line-height:.92;color:{{ accent }};\">{{ gearLabel }}<\u002Fdiv>\n          <div style=\"font-family:'Spline Sans Mono',monospace;font-size:10px;letter-spacing:3px;color:{{ subText }};\">GANG<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"font-family:'Spline Sans Mono',monospace;font-size:11px;letter-spacing:2px;color:#a09a8e;text-transform:uppercase;\">Simson S51 · Tacho 480×480 px · {{ themeLabel }}<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:620,&quot;height&quot;:660},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;tag&quot;,&quot;nacht&quot;],&quot;default&quot;:&quot;tag&quot;,&quot;tsType&quot;:&quot;'tag' | 'nacht'&quot;}}\">\nclass Component extends DCLogic {\n  state = { speed: 0, rpm: 1300, gear: 1, phase: 'accel', neutralT: 0 };\n\n  componentDidMount() {\n    this.cruiseT = 0;\n    this.timer = setInterval(() => this.tick(), 50);\n  }\n  componentWillUnmount() { clearInterval(this.timer); }\n\n  rpmFor(gear, speed) {\n    const R = ({1:[0,24],2:[18,40],3:[34,60],4:[52,80]})[gear] || [0,24];\n    let t = (speed - R[0]) / (R[1] - R[0]);\n    t = Math.max(0, Math.min(1.05, t));\n    return Math.round(1300 + t * (6000 - 1300));\n  }\n\n  tick() {\n    let { speed, gear, phase, neutralT } = this.state;\n\n    if (phase === 'neutral') {\n      neutralT -= 1;\n      if (neutralT <= 0) {\n        this.setState({ phase: 'accel', gear: 1, neutralT: 0, speed: 0, rpm: this.rpmFor(1, 0) });\n      } else {\n        this.setState({ neutralT, rpm: 1300 });\n      }\n      return;\n    }\n\n    if (phase === 'accel') {\n      speed += 0.35;\n      if (speed >= 80) { speed = 80; phase = 'cruise'; this.cruiseT = 45; }\n    } else if (phase === 'cruise') {\n      this.cruiseT -= 1;\n      if (this.cruiseT <= 0) phase = 'decel';\n    } else if (phase === 'decel') {\n      speed -= 0.45;\n      if (speed <= 1) {\n        this.setState({ speed: 0, gear: 0, phase: 'neutral', neutralT: 26, rpm: 1300 });\n        return;\n      }\n    }\n\n    let rpm = this.rpmFor(gear, speed);\n    if (phase === 'accel' && rpm >= 5700 && gear < 4) { gear += 1; rpm = this.rpmFor(gear, speed); }\n    if (phase === 'decel' && rpm <= 1850 && gear > 1) { gear -= 1; rpm = this.rpmFor(gear, speed); }\n\n    this.setState({ speed, gear, phase, rpm, neutralT });\n  }\n\n  makeTicks(base, red, labelColor) {\n    const arr = [];\n    for (let i = 0; i <= 12; i++) {\n      const major = i % 2 === 0;\n      const deg = -135 + (i / 12) * 270;\n      const inRed = (i * 0.5) >= 5;\n      arr.push({\n        deg: +deg.toFixed(2),\n        negdeg: +(-deg).toFixed(2),\n        len: major ? 24 : 12,\n        w: major ? 4 : 2,\n        stroke: inRed ? red : base,\n        label: major ? String(i / 2) : '',\n        labelColor: inRed ? red : labelColor,\n      });\n    }\n    return arr;\n  }\n\n  renderVals() {\n    const { speed, rpm, gear } = this.state;\n    const frac = Math.max(0, Math.min(1, rpm / 6000));\n    const night = (this.props.theme ?? 'tag') === 'nacht';\n\n    const day = {\n      bezel: 'linear-gradient(150deg,#3a3a3e,#1a1a1c 60%,#2a2a2d)',\n      face: 'radial-gradient(circle at 50% 42%,#f1ebda 0%,#e6dcc4 70%,#d6cbb0 100%)',\n      faceShadow: 'inset 0 0 30px rgba(120,100,60,.25),inset 0 2px 10px rgba(255,255,255,.5)',\n      track: 'rgba(40,35,28,.14)', accent: '#c0202a', arcFilter: 'none',\n      speedColor: '#1b1a17', wordColor: '#26231d', subText: '#6f6a5e',\n      ticks: this.makeTicks('#26231d', '#c0202a', '#26231d'),\n      themeLabel: 'Tag',\n    };\n    const nacht = {\n      bezel: 'linear-gradient(150deg,#2c2c2f,#101012 60%,#222225)',\n      face: 'radial-gradient(circle at 50% 40%,#211d18 0%,#15110d 68%,#0b0907 100%)',\n      faceShadow: 'inset 0 0 40px rgba(0,0,0,.7)',\n      track: 'rgba(220,205,170,.12)', accent: '#e23b32',\n      arcFilter: 'drop-shadow(0 0 7px rgba(226,59,50,.65))',\n      speedColor: '#ece3cd', wordColor: '#e6dcc4', subText: '#9a9080',\n      ticks: this.makeTicks('#cdbf9f', '#e23b32', '#cdbf9f'),\n      themeLabel: 'Nacht',\n    };\n    const c = night ? nacht : day;\n\n    return {\n      speed: Math.round(speed),\n      rpmK: (rpm / 1000).toFixed(1),\n      gearLabel: gear === 0 ? 'N' : String(gear),\n      arcDash: (frac * 1065).toFixed(1) + ' 1420',\n      ...c,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
